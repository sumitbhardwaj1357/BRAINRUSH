<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Checkout | BRAINRUSH</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="navbar">
      <div class="container nav-container">
        <a href="index.html" class="logo">
          <img src="logo_png.jpeg" alt="BRAINRUSH Logo" />
          <span></span>
        </a>
        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="products.html">Products</a>
          <a href="about.html">About</a>
          <a href="orders.html">My Orders</a>
          <a href="contact.html">Contact</a>
        </nav>
        <button class="cart-btn" id="cartBtn">
          Cart <span id="cartCount">0</span>
        </button>
      </div>
    </header>

    <section class="checkout-section">
      <div class="container">
        <div class="checkout-box">
          <h1>Checkout</h1>

          <form id="checkoutForm">
            <div class="input-group">
              <label>Full Name</label>

              <input type="text" id="customerName" required />
            </div>

            <div class="input-group">
              <label>Phone Number</label>

              <input type="text" id="customerPhone" required />
            </div>

            <div class="input-group">
              <label>Email Address</label>

              <input type="email" id="customerEmail" required />
            </div>

            <div class="input-group">
              <label>Delivery Address</label>

              <textarea id="customerAddress" rows="5" required></textarea>
            </div>

            <button type="submit" class="primary-btn full-btn">
              Place Order
            </button>
          </form>
        </div>
      </div>
    </section>
   
    <p class="form-note">
  Please use the same name and phone number you used while signing in.
</p>

    <script src="script.js"></script>
  </body>
</html>
